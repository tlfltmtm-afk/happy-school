<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인별 리포트 뷰어</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="report.css">
    <script src="db.js"></script>
    <script src="survey-data.js"></script>
</head>
<body>

    <!-- 고정된 뷰어 툴바 (인쇄 시 숨김) -->
    <div class="viewer-toolbar no-print">
        <div class="toolbar-left">
            <span id="pageIndicator">학생 1 / 0</span>
        </div>
        <div class="toolbar-center">
            <label for="studentSelector" style="color:white; font-size:14px; margin-right:8px;">학생 이동:</label>
            <select id="studentSelector" onchange="jumpToStudent(this.value)">
                <option value="">불러오는 중...</option>
            </select>

            <label for="viewMode" style="color:white; font-size:14px; margin-left:20px; margin-right:8px;">보기:</label>
            <select id="viewMode" onchange="changeViewMode(this.value)">
                <option value="1">1쪽</option>
                <option value="2">2쪽</option>
                <option value="3">3쪽</option>
                <option value="4">4쪽</option>
            </select>

            <div style="display:flex; align-items:center; margin-left:20px; gap:5px;">
                <button class="btn-icon" onclick="zoomOut()" title="축소"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                <span id="zoomLabel" style="font-size:14px; width:45px; text-align:center;">100%</span>
                <button class="btn-icon" onclick="zoomIn()" title="확대"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            </div>
        </div>
        <div class="toolbar-right">
            <button class="btn" onclick="window.print()" title="현재 학생의 리포트(2장)를 인쇄하거나 PDF로 저장합니다.">
                <i class="fa-solid fa-print"></i> 인쇄 및 PDF 저장
            </button>
        </div>
    </div>

    <!-- 페이지 컨테이너 -->
    <div class="document-container" id="documentContainer">
        <!-- JS가 여기에 2장의 A4 페이지를 렌더링합니다 -->
    </div>

    <!-- 부유형 하단 네비게이션 (인쇄 시 숨김) -->
    <div class="bottom-nav no-print">
        <button class="nav-btn" onclick="prevStudent()" id="btnPrev"><i class="fa-solid fa-chevron-left"></i> 이전 학생</button>
        <span>현재 <strong id="bottomIndicator">1</strong>번째 학생 리포트 열람 중</span>
        <button class="nav-btn" onclick="nextStudent()" id="btnNext">다음 학생 <i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <script src="report.js"></script>
</body>
</html>
